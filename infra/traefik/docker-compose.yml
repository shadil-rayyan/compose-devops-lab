version: "3.9"

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
    - "--api.insecure=true"
    - "--providers.docker=true"
    - "--providers.docker.endpoint=unix:///var/run/docker.sock"
    - "--providers.docker.exposedbydefault=false"
    - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"
    networks:
      - devops-net

networks:
  devops-net:
    external: true